<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOUMY</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #faf9f6; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .kanban-col { transition: background-color 0.15s ease; }
        .drag-over { background-color: #f3f1eb !important; border-color: #b8b4b2 !important; }
        .file-hover { background-color: #f0fdf4 !important; border-color: #22c55e !important; transform: scale(1.01); }
        .task-card { cursor: grab; transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .task-card:active { cursor: grabbing; }
        .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 p-3 md:p-6 text-xs bg-[#fbfbfa] select-none">

    <header class="max-w-6xl mx-auto mb-4 flex justify-between items-center border-b border-gray-200 pb-2">
        <div class="flex items-center gap-1.5">
            <h1 class="text-xl font-black tracking-wider text-gray-900">HOUMY</h1>
            <span class="w-2 h-2 rounded-full bg-green-500 inline-block animate-pulse" title="Connected"></span>
        </div>
        <div class="flex gap-1">
            <button onclick="openFilesModal()" class="bg-indigo-50 border border-indigo-100 text-indigo-700 px-2.5 py-1.5 rounded-lg hover:bg-indigo-100 transition font-bold shadow-sm">
                📁 Failai
            </button>
            <button onclick="openHistoryModal()" class="border border-gray-200 text-gray-600 px-2.5 py-1.5 rounded-lg hover:bg-gray-50 transition font-medium">
                📋 Žurnalas
            </button>
            <button onclick="openCreateModal()" class="bg-gray-900 text-white px-3.5 py-1.5 rounded-lg shadow-sm hover:bg-gray-800 transition font-bold">
                + Nauja
            </button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto mb-4 flex flex-col sm:flex-row gap-2 items-stretch sm:items-center justify-between bg-white p-2 rounded-xl border border-gray-200 shadow-sm">
        <div class="relative max-w-[180px] w-full">
            <span class="absolute inset-y-0 left-0 flex items-center pl-2 pointer-events-none text-gray-400">🔍</span>
            <input type="text" id="searchBar" oninput="renderTasks()" class="w-full pl-6 pr-2 py-1 rounded-md border border-gray-300 bg-gray-50 text-xs focus:bg-white outline-none transition" placeholder="">
        </div>

        <div class="flex flex-wrap items-center gap-1">
            <button id="filter-all" onclick="setFilter('all')" ondragover="allowDrop(event)" ondragenter="dragEnterAssignee('all', event)" ondragleave="dragLeaveAssignee('all')" ondrop="dropAssignee(event, 'all')" class="px-3 py-1 rounded-md font-bold transition bg-gray-900 text-white shadow-sm">
                VISI
            </button>
            <button id="filter-Ramūnas" onclick="setFilter('Ramūnas')" ondragover="allowDrop(event)" ondragenter="dragEnterAssignee('Ramūnas', event)" ondragleave="dragLeaveAssignee('Ramūnas')" ondrop="dropAssignee(event, 'Ramūnas')" class="px-3 py-1 rounded-md font-bold transition text-gray-500 hover:bg-gray-100">
                Ramūnas
            </button>
            <button id="filter-Ingrida" onclick="setFilter('Ingrida')" ondragover="allowDrop(event)" ondragenter="dragEnterAssignee('Ingrida', event)" ondragleave="dragLeaveAssignee('Ingrida')" ondrop="dropAssignee(event, 'Ingrida')" class="px-3 py-1 rounded-md font-bold transition text-gray-500 hover:bg-gray-100">
                Ingrida
            </button>
            <button id="filter-Aušrinė" onclick="setFilter('Aušrinė')" ondragover="allowDrop(event)" ondragenter="dragEnterAssignee('Aušrinė', event)" ondragleave="dragLeaveAssignee('Aušrinė')" ondrop="dropAssignee(event, 'Aušrinė')" class="px-3 py-1 rounded-md font-bold transition text-gray-500 hover:bg-gray-100">
                Aušrinė
            </button>
        </div>

        <div class="flex items-center gap-0.5 bg-gray-100 p-0.5 rounded-lg border border-gray-200">
            <button id="view-kanban" onclick="setLayout('kanban')" class="px-2 py-0.5 rounded transition text-gray-500 hover:text-gray-900 font-medium text-[11px]">📊 Stulpeliai</button>
            <button id="view-rows" onclick="setLayout('rows')" class="px-2 py-0.5 rounded transition text-gray-500 hover:text-gray-900 font-medium text-[11px]">☰ Eilutės</button>
        </div>
    </div>

    <div id="boardWrapper" class="grid grid-cols-1 md:grid-cols-3 gap-3 max-w-6xl mx-auto">
        <div id="col-todo" class="kanban-col bg-gray-50 rounded-xl p-2.5 border border-gray-200 flex flex-col" ondragover="allowDrop(event)" ondragenter="dragEnter('col-todo')" ondragleave="dragLeave('col-todo')" ondrop="drop(event, 'todo')">
            <h2 class="font-bold text-gray-500 text-xs mb-2 flex items-center justify-between px-0.5 shrink-0">
                <div class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span><span>Naujos</span></div>
                <span id="count-todo" class="bg-gray-200 text-gray-600 text-[10px] px-1.5 rounded-full font-bold">0</span>
            </h2>
            <div id="tasks-todo" class="space-y-1.5 flex-1"></div>
        </div>
        <div id="col-progress" class="kanban-col bg-blue-50/20 rounded-xl p-2.5 border border-blue-100 flex flex-col" ondragover="allowDrop(event)" ondragenter="dragEnter('col-progress')" ondragleave="dragLeave('col-progress')" ondrop="drop(event, 'progress')">
            <h2 class="font-bold text-blue-900 text-xs mb-2 flex items-center justify-between px-0.5 shrink-0">
                <div class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span>Vykdomos</span></div>
                <span id="count-progress" class="bg-blue-100 text-blue-800 text-[10px] px-1.5 rounded-full font-bold">0</span>
            </h2>
            <div id="tasks-progress" class="space-y-1.5 flex-1"></div>
        </div>
        <div id="col-done" class="kanban-col bg-green-50/20 rounded-xl p-2.5 border border-green-100 flex flex-col" ondragover="allowDrop(event)" ondragenter="dragEnter('col-done')" ondragleave="dragLeave('col-done')" ondrop="drop(event, 'done')">
            <h2 class="font-bold text-green-900 text-xs mb-2 flex items-center justify-between px-0.5 shrink-0">
                <div class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span><span>Baigtos</span></div>
                <span id="count-done" class="bg-green-100 text-green-800 text-[10px] px-1.5 rounded-full font-bold">0</span>
            </h2>
            <div id="tasks-done" class="space-y-1.5 flex-1"></div>
        </div>
    </div>

    <div id="filesModal" class="fixed inset-0 bg-black bg-opacity-30 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl p-4 flex flex-col h-[70vh]">
            <div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-1.5 shrink-0">
                <div class="flex items-center gap-2">
                    <h3 class="text-xs font-bold text-gray-900">📁 Failinė</h3>
                    <input type="file" id="shelfFileInput" class="hidden" onchange="handleShelfFileSelect(this)">
                    <button onclick="document.getElementById('shelfFileInput').click()" class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded hover:bg-indigo-700 shadow-sm transition">+</button>
                </div>
                <button onclick="closeFilesModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            
            <div class="mb-2 bg-gray-50 border border-gray-200/60 p-1.5 rounded-md shrink-0">
                <div class="flex justify-between font-semibold text-[9px] text-gray-500 mb-0.5">
                    <span id="storageText">...</span>
                    <span id="storagePct">0%</span>
                </div>
                <div class="w-full bg-gray-200 h-1 rounded-full overflow-hidden">
                    <div id="storageBar" class="bg-indigo-600 h-1 transition-all duration-300 w-0"></div>
                </div>
            </div>

            <div id="fileShelfContainer" class="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-1.5 pr-1 no-scrollbar"></div>
            <div class="flex justify-end border-t border-gray-100 pt-2 mt-2 shrink-0">
                <button onclick="closeFilesModal()" class="px-3 py-1 bg-gray-900 text-white rounded-md font-bold text-[11px]">Uždaryti</button>
            </div>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-black bg-opacity-30 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-4 border border-gray-100 flex flex-col max-h-[82vh]">
            
            <div class="flex justify-between items-center mb-2 shrink-0">
                <h3 id="modalTitle" class="text-xs font-bold text-gray-900">Užduotis</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            
            <input type="hidden" id="editingId">
            
            <div class="flex-1 overflow-y-auto no-scrollbar space-y-2 pr-0.5 pb-1.5">
                <div>
                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-0.5">Pavadinimas *</label>
                    <input type="text" id="taskTitle" class="w-full border border-gray-300 rounded-md p-1.5 outline-none text-xs focus:ring-1 focus:ring-gray-900">
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-gray-400 uppercase mb-0.5">Aprašymas</label>
                    <textarea id="taskDesc" rows="1" class="w-full border border-gray-300 rounded-md p-1.5 outline-none text-xs focus:ring-1 focus:ring-gray-900"></textarea>
                </div>
                
                <div class="grid grid-cols-3 gap-1.5">
                    <div>
                        <label class="block text-[9px] font-bold text-gray-400 uppercase mb-0.5">Kas darys</label>
                        <select id="taskAssignee" class="w-full border border-gray-300 rounded-md p-1 bg-white outline-none">
                            <option value="Ramūnas">Ramūnas</option>
                            <option value="Ingrida">Ingrida</option>
                            <option value="Aušrinė">Aušrinė</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-gray-400 uppercase mb-0.5">Terminas</label>
                        <input type="date" id="taskDate" class="w-full border border-gray-300 rounded-md p-1 outline-none">
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-gray-400 uppercase mb-0.5">Skubumas</label>
                        <select id="taskPriority" class="w-full border border-gray-300 rounded-md p-1 bg-white outline-none font-bold text-gray-700">
                            <option value="low">Žemas</option>
                            <option value="medium" selected>Vidutinis</option>
                            <option value="high">Skubu 🚨</option>
                        </select>
                    </div>
                </div>

                <div class="pt-0.5">
                    <label class="flex items-center gap-1 text-[9px] font-bold text-gray-500 cursor-pointer select-none bg-gray-100 px-1.5 py-0.5 rounded border border-gray-200/60 w-fit">
                        <input type="checkbox" id="toggleAdvanced" onchange="toggleAdvancedFields()" class="rounded border-gray-300 text-gray-900 focus:ring-0 w-2.5 h-2.5">
                        <span>⚙️ Papildomai</span>
                    </label>
                </div>

                <div id="advancedFields" class="hidden space-y-2 border-t border-dashed border-gray-200 pt-1.5">
                    <div>
                        <label class="block text-[9px] font-bold text-indigo-600 uppercase mb-0.5">🔗 Nuoroda</label>
                        <input type="url" id="taskFileUrl" class="w-full border border-indigo-100 bg-indigo-50/10 rounded-md p-1.5 outline-none text-xs" placeholder="Gmail / Drive / URL">
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-gray-400 uppercase mb-0.5">Kategorija</label>
                        <select id="taskCategory" class="w-full border border-gray-300 rounded-md p-1 bg-white outline-none">
                            <option value="Užsakymai">Užsakymai</option>
                            <option value="Gamyba / Tiekėjai">Gamyba / Tiekėjai</option>
                            <option value="Marketingas">Marketingas</option>
                            <option value="Kita" selected>Kita</option>
                        </select>
                    </div>
                </div>

                <div class="bg-amber-50/40 p-2 rounded-lg border border-amber-200/40">
                    <label class="block text-[9px] font-bold text-amber-800 uppercase mb-1">📝 Užrašai</label>
                    <div id="commentsContainer" class="space-y-1 mb-1 max-h-20 overflow-y-auto no-scrollbar text-[11px]"></div>
                    <div class="flex gap-1">
                        <input type="text" id="newCommentText" class="flex-1 border border-gray-300 rounded-md px-2 py-0.5 text-xs outline-none bg-white" placeholder="...">
                        <button onclick="addCommentItem()" class="bg-gray-900 text-white px-2 py-0.5 rounded-md text-[10px] font-bold shrink-0">+</button>
                    </div>
                </div>

                <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                    <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">📋 Etapai</label>
                    <div id="checklistContainer" class="space-y-1 mb-1"></div>
                    <div class="flex gap-1">
                        <input type="text" id="newChecklistItem" class="flex-1 border border-gray-300 rounded-md px-2 py-0.5 text-xs outline-none" placeholder="...">
                        <button onclick="addChecklistItem()" class="bg-gray-200 text-gray-800 px-2 py-0.5 rounded-md text-[10px] font-bold shrink-0">+</button>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-between items-center border-t border-gray-100 pt-2 shrink-0 mt-1">
                <button id="deleteBtn" onclick="deleteTask()" class="text-xs text-red-500 hover:text-red-700 font-bold hidden">Ištrinti</button>
                <div class="flex space-x-1.5 ml-auto">
                    <button onclick="closeModal()" class="px-3 py-1 text-gray-500 hover:bg-gray-100 rounded-md font-medium">Atšaukti</button>
                    <button onclick="saveTask()" class="px-4 py-1 bg-gray-900 text-white rounded-md font-bold hover:bg-gray-800">Išsaugoti</button>
                </div>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black bg-opacity-30 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-4 flex flex-col h-[65vh]">
            <div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-1.5">
                <h3 class="text-xs font-bold text-gray-900">Žurnalas</h3>
                <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-1 pr-1 no-scrollbar text-[11px]"></div>
            <div class="flex justify-end border-t border-gray-100 pt-2 mt-2 shrink-0">
                <button onclick="closeHistoryModal()" class="px-3 py-1 bg-gray-900 text-white rounded-md font-bold">Uždaryti</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9Pa3g4DGl2Ddu5F9RGjwZkPCIDovE-u4",
            authDomain: "houmy-tasks.firebaseapp.com",
            projectId: "houmy-tasks",
            storageBucket: "houmy-tasks.firebasestorage.app",
            messagingSenderId: "609731292978",
            appId: "1:609731292978:web:f22196ebcc0f86baf4f12b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let tasks = [];
        let historyLog = [];
        let sharedFiles = [];
        let currentFilter = 'all';
        let currentChecklist = [];
        let currentComments = []; 
        let currentLayout = localStorage.getItem('houmy_layout') || 'kanban'; 
        
        let totalStorageSize = 0;
        const MAX_STORAGE_BYTES = 5 * 1024 * 1024 * 1024; 

        function toggleAdvancedFields() {
            const checkbox = document.getElementById('toggleAdvanced');
            const target = document.getElementById('advancedFields');
            if (checkbox && target) {
                if (checkbox.checked) target.classList.remove('hidden');
                else target.classList.add('hidden');
            }
        }

        function setLayout(layout) {
            currentLayout = layout;
            localStorage.setItem('houmy_layout', layout);
            updateLayoutUI();
            renderTasks();
        }

        function updateLayoutUI() {
            const boardWrapper = document.getElementById('boardWrapper');
            const btnKanban = document.getElementById('view-kanban');
            const btnRows = document.getElementById('view-rows');
            const statuses = ['todo', 'progress', 'done'];

            if (currentLayout === 'rows') {
                if (boardWrapper) boardWrapper.className = "flex flex-col gap-2 max-w-6xl mx-auto";
                statuses.forEach(status => {
                    const colEl = document.getElementById(`col-${status}`);
                    const tasksEl = document.getElementById(`tasks-${status}`);
                    if (colEl) colEl.className = `kanban-col ${status === 'todo' ? 'bg-gray-50 border-gray-200' : status === 'progress' ? 'bg-blue-50/10 border-blue-100/60' : 'bg-green-50/10 border-green-100/60'} rounded-xl p-2 border flex flex-col gap-1`;
                    if (tasksEl) tasksEl.className = "flex flex-col gap-1 w-full";
                });
                if (btnRows) btnRows.className = "px-2 py-0.5 rounded font-bold transition bg-white shadow-sm text-gray-900 text-[11px]";
                if (btnKanban) btnKanban.className = "px-2 py-0.5 rounded font-bold transition text-gray-500 hover:text-gray-900 text-[11px]";
            } else {
                if (boardWrapper) boardWrapper.className = "grid grid-cols-1 md:grid-cols-3 gap-3 max-w-6xl mx-auto";
                statuses.forEach(status => {
                    const colEl = document.getElementById(`col-${status}`);
                    const tasksEl = document.getElementById(`tasks-${status}`);
                    if (colEl) colEl.className = `kanban-col ${status === 'todo' ? 'bg-gray-50 border-gray-200/80' : status === 'progress' ? 'bg-blue-50/10 border-blue-100/60' : 'bg-green-50/10 border-green-100/60'} rounded-xl p-2 flex flex-col`;
                    if (tasksEl) tasksEl.className = "space-y-1.5 flex-1 min-h-[220px] pt-0.5";
                });
                if (btnKanban) btnKanban.className = "px-2 py-0.5 rounded font-bold transition bg-white shadow-sm text-gray-900 text-[11px]";
                if (btnRows) btnRows.className = "px-2 py-0.5 rounded font-bold transition text-gray-500 hover:text-gray-900 text-[11px]";
            }
        }

        function forceDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function openFilesModal() { document.getElementById('filesModal').classList.remove('hidden'); }
        function closeFilesModal() { document.getElementById('filesModal').classList.add('hidden'); }

        async function handleShelfFileSelect(input) {
            if (input.files && input.files.length > 0) {
                const file = input.files[0];
                await handleFileUpload(file, 'all');
                input.value = '';
            }
        }

        async function handleFileUpload(file, targetMember) {
            if (totalStorageSize + file.size > MAX_STORAGE_BYTES) {
                alert(`Talpa pilna!`); return;
            }
            const savedSender = localStorage.getItem('houmy_user_name') || "Ramūnas";
            const sender = prompt(`Kas siunčia?`, savedSender); if (!sender) return;
            localStorage.setItem('houmy_user_name', sender);
            const targetName = targetMember === 'all' ? 'VISIEMS' : targetMember;

            try {
                const fileRef = ref(storage, `houmy_shared/${Date.now()}_${file.name}`);
                const metadata = { contentDisposition: `attachment; filename="${file.name}"` };
                const snapshot = await uploadBytes(fileRef, file, metadata);
                const downloadUrl = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, "shared_files"), {
                    name: file.name, url: downloadUrl, storagePath: fileRef.fullPath, from: sender, to: targetName, timestamp: Date.now(),
                    size: file.size, 
                    dateStr: new Date().toLocaleDateString('lt-LT') + ' ' + new Date().toLocaleTimeString('lt-LT', {hour: '2-digit', minute:'2-digit'})
                });
                logAction(`Įkeltas failas`);
            } catch (error) { console.error(error); }
        }

        function updateStorageBarUI() {
            const txt = document.getElementById('storageText'); const bar = document.getElementById('storageBar'); const pctText = document.getElementById('storagePct');
            if (!txt || !bar || !pctText) return;
            const usedMB = (totalStorageSize / (1024 * 1024)).toFixed(1); const pct = Math.min(((totalStorageSize / MAX_STORAGE_BYTES) * 100), 100).toFixed(1);
            txt.innerText = `${usedMB} MB / 5.0 GB`; pctText.innerText = `${pct}%`; bar.style.width = `${pct}%`;
            if (pct > 90) bar.className = "bg-red-600 h-1 transition-all"; else if (pct > 70) bar.className = "bg-amber-500 h-1 transition-all"; else bar.className = "bg-indigo-600 h-1 transition-all";
        }

        async function deleteSharedFile(id, storagePath, name) {
            if (confirm(`Ištrinti failą?`)) {
                try { await deleteDoc(doc(db, "shared_files", id)); await deleteObject(ref(storage, storagePath)); logAction(`Ištrintas failas`); } catch (e) { console.error(e); }
            }
        }

        // Išvalyta failinės lentyna modale
        function renderFileShelf() {
            const container = document.getElementById('fileShelfContainer'); if (!container) return;
            container.innerHTML = '';
            if (sharedFiles.length === 0) { container.innerHTML = `<div class="text-gray-400 text-xs py-4 text-center col-span-full italic">Tuščia.</div>`; return; }
            sharedFiles.forEach(file => {
                const item = document.createElement('div'); item.className = 'bg-gray-50 p-2 rounded-md border border-gray-200 flex flex-col justify-between relative group';
                const fSize = file.size ? (file.size / (1024 * 1024)).toFixed(1) + 'M' : '';
                item.innerHTML = `
                    <button onclick="deleteSharedFile('${file.id}', '${file.storagePath}', '${file.name}')" class="absolute top-0.5 right-1 text-gray-300 hover:text-red-500 font-bold text-xs opacity-0 group-hover:opacity-100">✕</button>
                    <div>
                        <div class="text-[8px] text-gray-400 font-mono">${file.dateStr} [${fSize}]</div>
                        <div class="text-[11px] font-bold text-gray-900 truncate" title="${file.name}">📄 ${file.name}</div>
                        <div class="text-[9px] text-gray-500">${file.from} ➔ ${file.to}</div>
                    </div>
                    <button onclick="forceDownload('${file.url}', '${file.name}')" class="mt-1 bg-indigo-600 text-white text-[10px] font-bold py-0.5 rounded hover:bg-indigo-700">Atsisiųsti</button>
                `;
                container.appendChild(item);
            });
        }

        function openCreateModal() {
            currentChecklist = []; currentComments = [];
            document.getElementById('modalTitle').innerText = 'Nauja';
            document.getElementById('editingId').value = '';
            document.getElementById('taskTitle').value = ''; document.getElementById('taskDesc').value = ''; document.getElementById('taskFileUrl').value = ''; document.getElementById('taskDate').value = '';
            document.getElementById('taskPriority').value = 'medium'; document.getElementById('taskCategory').value = 'Kita';
            document.getElementById('deleteBtn').classList.add('hidden');
            const checkbox = document.getElementById('toggleAdvanced'); if (checkbox) checkbox.checked = false;
            toggleAdvancedFields(); renderChecklistDOM(); renderCommentsDOM();
            document.getElementById('taskModal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const task = tasks.find(t => t.id === id); if (!task) return;
            currentChecklist = Array.isArray(task.checklist) ? task.checklist : []; currentComments = Array.isArray(task.comments) ? task.comments : [];
            document.getElementById('modalTitle').innerText = 'Redaguoti';
            document.getElementById('editingId').value = task.id;
            document.getElementById('taskTitle').value = task.title || ''; document.getElementById('taskDesc').value = task.desc || '';
            document.getElementById('taskFileUrl').value = task.fileUrl || ''; document.getElementById('taskDate').value = task.date || '';
            document.getElementById('taskPriority').value = task.priority || 'medium'; document.getElementById('taskCategory').value = task.category || 'Kita';
            document.getElementById('taskAssignee').value = task.assignee || 'Ramūnas';
            document.getElementById('deleteBtn').classList.remove('hidden');
            
            const checkbox = document.getElementById('toggleAdvanced');
            if (checkbox) checkbox.checked = !!(task.fileUrl || (task.category && task.category !== 'Kita'));
            toggleAdvancedFields(); renderChecklistDOM(); renderCommentsDOM();
            document.getElementById('taskModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }
        function addChecklistItem() {
            const input = document.getElementById('newChecklistItem'); const text = input.value.trim(); if (!text) return;
            currentChecklist.push({ text: text, done: false }); input.value = ''; renderChecklistDOM();
        }
        function toggleChecklistState(index) { if (currentChecklist[index]) { currentChecklist[index].done = !currentChecklist[index].done; renderChecklistDOM(); } }
        function removeChecklistItem(index) { currentChecklist.splice(index, 1); renderChecklistDOM(); }

        function renderChecklistDOM() {
            const container = document.getElementById('checklistContainer'); if (!container) return;
            container.innerHTML = '';
            currentChecklist.forEach((item, idx) => {
                const div = document.createElement('div'); div.className = 'flex items-center justify-between bg-white p-1 border border-gray-200 rounded';
                div.innerHTML = `
                    <div class="flex items-center gap-1.5 text-xs">
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleChecklistState(${idx})" class="w-3.5 h-3.5 border-gray-300 text-gray-900 rounded focus:ring-0">
                        <span class="${item.done ? 'line-through text-gray-400' : 'text-gray-700'}">${item.text || ''}</span>
                    </div>
                    <button onclick="removeChecklistItem(${idx})" class="text-red-400 font-bold text-[10px] px-1">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function addCommentItem() {
            const input = document.getElementById('newCommentText'); const text = input.value.trim(); if (!text) return;
            const author = localStorage.getItem('houmy_user_name') || "Ramūnas"; const now = new Date();
            const timeStr = now.toLocaleDateString('lt-LT', {month: '2-digit', day: '2-digit'}) + ' ' + now.toLocaleTimeString('lt-LT', {hour: '2-digit', minute: '2-digit'});
            currentComments.push({ text, author, time: timeStr }); input.value = ''; renderCommentsDOM();
        }

        function renderCommentsDOM() {
            const container = document.getElementById('commentsContainer'); if (!container) return;
            container.innerHTML = '';
            if (currentComments.length === 0) { container.innerHTML = `<div class="text-gray-400 italic text-[9px]">Nėra.</div>`; return; }
            currentComments.forEach((item) => {
                const div = document.createElement('div'); div.className = 'bg-white p-1 border border-amber-100 rounded shadow-sm';
                div.innerHTML = `
                    <div class="flex justify-between text-[8px] text-gray-400"><span class="text-amber-800 font-bold">${item.author || ''}</span><span>${item.time || ''}</span></div>
                    <div class="text-gray-700 text-[10px] leading-tight">${item.text || ''}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function openHistoryModal() {
            const listContainer = document.getElementById('historyList'); if (!listContainer) return;
            listContainer.innerHTML = '';
            if (historyLog.length === 0) { listContainer.innerHTML = `<div class="text-gray-400 text-center py-2">Tuščia.</div>`; } 
            else {
                historyLog.forEach(item => {
                    const el = document.createElement('div'); el.className = 'p-1 bg-gray-50 border border-gray-100 rounded flex gap-2 items-baseline';
                    el.innerHTML = `<span class="text-[8px] font-mono text-gray-400 shrink-0">${item.time || ''}</span> <span class="text-gray-600">${item.text || ''}</span>`;
                    listContainer.appendChild(el);
                });
            }
            document.getElementById('historyModal').classList.remove('hidden');
        }
        function closeHistoryModal() { document.getElementById('historyModal').classList.add('hidden'); }

        async function logAction(text) {
            const now = new Date(); const timeStr = now.toLocaleDateString('lt-LT', {month: '2-digit', day: '2-digit'}) + ' ' + now.toLocaleTimeString('lt-LT', { hour: '2-digit', minute: '2-digit' });
            await addDoc(collection(db, "history"), { time: timeStr, text: text, timestamp: now.getTime() });
        }

        async function saveTask() {
            const id = document.getElementById('editingId').value;
            const title = document.getElementById('taskTitle').value.trim(); const desc = document.getElementById('taskDesc').value.trim();
            const fileUrl = document.getElementById('taskFileUrl').value.trim(); const assignee = document.getElementById('taskAssignee').value;
            const date = document.getElementById('taskDate').value; const priority = document.getElementById('taskPriority').value;
            const category = document.getElementById('taskCategory').value; const todayStr = new Date().toISOString().split('T')[0];

            if (!title) { alert('Įveskite pavadinimą!'); return; }

            if (id) {
                const oldTask = tasks.find(t => t.id === id); const wasTransferred = oldTask && oldTask.assignee !== assignee;
                if (wasTransferred) logAction(`„${title}“ ➔ ${assignee}`);
                const oldCommentsLength = oldTask && Array.isArray(oldTask.comments) ? oldTask.comments.length : 0;
                if (currentComments.length > oldCommentsLength) { const lastComment = currentComments[currentComments.length - 1]; logAction(`„${title}“ užrašas: "${lastComment.text}"`); }
                await updateDoc(doc(db, "tasks", id), { title, desc, fileUrl, assignee, date, priority, category, checklist: currentChecklist, comments: currentComments, isTransferred: wasTransferred ? true : (oldTask ? oldTask.isTransferred : false) });
            } else {
                await addDoc(collection(db, "tasks"), { title, desc, fileUrl, assignee, date, priority, category, checklist: currentChecklist, comments: currentComments, status: 'todo', createdAt: todayStr, isTransferred: false });
                logAction(`Sukurta: „${title}“`);
            }
            closeModal();
        }

        async function deleteTask() {
            const id = document.getElementById('editingId').value;
            if (id && confirm('Ištrinti?')) { const task = tasks.find(t => t.id === id); if (task) logAction(`Ištrinta: „${task.title}“`); await deleteDoc(doc(db, "tasks", id)); closeModal(); }
        }

        function drag(ev, id) { ev.dataTransfer.setData("text/plain", id); }
        function allowDrop(ev) { ev.preventDefault(); }
        function dragEnter(colId) { const el = document.getElementById(colId); if (el) el.classList.add('drag-over'); }
        function dragLeave(colId) { const el = document.getElementById(colId); if (el) el.classList.remove('drag-over'); }
        function isFileDrag(ev) { return ev.dataTransfer.types.includes('Files'); }

        function dragEnterAssignee(member, ev) { 
            const btn = document.getElementById(`filter-${member}`); if (btn) { if (isFileDrag(ev)) { btn.classList.add('file-hover'); } else { btn.classList.add('bg-indigo-50'); } }
        }
        function dragLeaveAssignee(member) { const btn = document.getElementById(`filter-${member}`); if (btn) btn.classList.remove('bg-indigo-50', 'file-hover'); updateFilterButtonUI(); }

        async function dropAssignee(ev, newAssignee) {
            ev.preventDefault(); const btn = document.getElementById(`filter-${newAssignee}`); if (btn) btn.classList.remove('bg-indigo-50', 'file-hover');
            if (ev.dataTransfer.files && ev.dataTransfer.files.length > 0) { const file = ev.dataTransfer.files[0]; await handleFileUpload(file, newAssignee); updateFilterButtonUI(); return; }
            const id = ev.dataTransfer.getData("text/plain"); const task = tasks.find(t => t.id === id);
            if (task && newAssignee !== 'all' && task.assignee !== newAssignee) { logAction(`„${task.title}“ ➔ ${newAssignee}`); await updateDoc(doc(db, "tasks", id), { assignee: newAssignee, isTransferred: true }); } else { updateFilterButtonUI(); }
        }

        async function drop(ev, newStatus) {
            ev.preventDefault(); document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
            const id = ev.dataTransfer.getData("text/plain"); const task = tasks.find(t => t.id === id);
            if (task && task.status !== newStatus) { const updateData = { status: newStatus }; if (newStatus === 'done') updateData.completedAt = new Date().toISOString().split('T')[0]; await updateDoc(doc(db, "tasks", id), updateData); }
        }

        function renderTasks() {
            // Saugus taisyklių aprašymas funkcijos viduje
            const priorityDots = { high: 'bg-red-500 shadow-sm', medium: 'bg-amber-400 shadow-sm', low: 'bg-green-500 shadow-sm' };
            const categoryStyles = { 'Užsakymai': 'bg-purple-50 text-purple-700', 'Gamyba / Tiekėjai': 'bg-blue-50 text-blue-700', 'Marketingas': 'bg-pink-50 text-pink-700', 'Kita': 'bg-gray-100 text-gray-600' };

            const lists = { 'todo': document.getElementById('tasks-todo'), 'progress': document.getElementById('tasks-progress'), 'done': document.getElementById('tasks-done') };
            Object.values(lists).forEach(list => { if (list) list.innerHTML = ''; }); const globalCounts = { todo: 0, progress: 0, done: 0 };
            const searchBarEl = document.getElementById('searchBar'); const searchQuery = searchBarEl ? searchBarEl.value.toLowerCase() : '';
            const today = new Date(); today.setHours(0,0,0,0); const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

            const priorityWeight = { high: 3, medium: 2, low: 1 };
            const sorted = [...tasks].sort((a, b) => {
                const wA = priorityWeight[a.priority || 'medium']; const wB = priorityWeight[b.priority || 'medium']; if (wB !== wA) return wB - wA;
                if (a.date && b.date) return new Date(a.date) - new Date(b.date); return a.date ? -1 : 1;
            });

            const filtered = sorted.filter(t => {
                const matchAssignee = (currentFilter === 'all' || t.assignee === currentFilter);
                return matchAssignee && ((t.title || '').toLowerCase().includes(searchQuery) || (t.desc || '').toLowerCase().includes(searchQuery));
            });

            filtered.forEach(task => {
                const currentStatus = task.status || 'todo';
                if (currentStatus === 'done' && task.completedAt && new Date(task.completedAt) < oneWeekAgo) return;
                if (globalCounts[currentStatus] !== undefined) globalCounts[currentStatus]++;

                let dateBadgeStyle = "text-gray-500 bg-gray-100 border border-gray-200 px-1 rounded text-[9px]";
                if (task.date && currentStatus !== 'done') {
                    if (new Date(task.date).setHours(0,0,0,0) < today) dateBadgeStyle = "text-red-700 bg-red-50 font-bold border border-red-200 px-1 rounded text-[9px] animate-pulse";
                }

                const pDot = `<span class="w-2 h-2 rounded-full ${priorityDots[task.priority || 'medium']} shrink-0"></span>`;
                const catBadge = task.category ? `<span class="text-[9px] px-1 rounded font-bold ${categoryStyles[task.category] || categoryStyles['Kita']}">${task.category}</span>` : '';
                const transferBadge = task.isTransferred ? `<span class="text-[9px] font-bold text-indigo-600">🔄</span>` : '';

                let commentBadgeHTML = "";
                if (Array.isArray(task.comments) && task.comments.length > 0) {
                    const lastComment = task.comments[task.comments.length - 1];
                    commentBadgeHTML = `<div class="mt-1 text-[10px] bg-amber-50/70 border border-amber-200/40 p-1 rounded text-gray-600 line-clamp-1"><span class="font-bold text-amber-900">${lastComment.author || ''}:</span> ${lastComment.text || ''}</div>`;
                }

                let linkLabel = "🔗 Nuoroda"; let linkStyle = "bg-indigo-50 border-indigo-100 text-indigo-700";
                if (task.fileUrl) {
                    if (task.fileUrl.includes("mail.google.com")) { linkLabel = "📧 Gmail"; linkStyle = "bg-red-50 border-red-100 text-red-600"; } 
                    else if (task.fileUrl.includes("drive.google.com") || task.fileUrl.includes("docs.google.com")) { linkLabel = "📁 Drive"; linkStyle = "bg-green-50 border-green-100 text-green-600"; }
                }

                const card = document.createElement('div'); card.setAttribute('draggable', 'true');
                card.addEventListener('dragstart', (e) => drag(e, task.id)); card.onclick = () => openEditModal(task.id);

                if (currentLayout === 'rows') {
                    let checklistMini = (Array.isArray(task.checklist) && task.checklist.length > 0) ? `<span class="text-[9px] text-gray-400 bg-gray-100 px-1 rounded">📋 ${task.checklist.filter(i => i && i.done).length}/${task.checklist.length}</span>` : '';
                    let fileIcon = task.fileUrl ? `<button onclick="event.stopPropagation(); forceDownload('${task.fileUrl}', 'nuoroda')" class="${linkStyle} font-bold text-[9px] px-1.5 py-0.5 rounded border transition shadow-sm">${linkLabel}</button>` : '';

                    card.className = "task-card bg-white p-1.5 rounded-lg shadow-sm border border-gray-200/80 flex flex-col sm:flex-row sm:items-center justify-between gap-2 w-full text-[11px]";
                    card.innerHTML = `
                        <div class="flex items-center gap-2 flex-1 min-w-0">
                            ${pDot}
                            <div class="truncate flex items-baseline gap-1.5">
                                <h4 class="font-bold text-gray-900">${task.title || '—'}</h4>
                                ${commentBadgeHTML ? `<span class="text-amber-700 text-[9px] max-w-[200px] truncate">${commentBadgeHTML.replace(/<\/?[^>]+(>|$)/g, "")}</span>` : task.desc ? `<span class="text-gray-400 text-[9px] truncate max-w-[200px]">— ${task.desc}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0">
                            ${catBadge} ${transferBadge} ${checklistMini} ${fileIcon}
                            <span class="${dateBadgeStyle}">${task.date ? task.date : '—'}</span>
                            <span class="text-[9px] font-bold bg-gray-50 text-gray-500 px-1.5 py-0.5 rounded border border-gray-200 text-center min-w-[55px]">${task.assignee || '—'}</span>
                        </div>
                    `;
                } else {
                    let checklistHTML = (Array.isArray(task.checklist) && task.checklist.length > 0) ? `<div class="mt-1 text-[9px] text-gray-400 font-medium">📋 ${task.checklist.filter(item => item && item.done).length}/${task.checklist.length}</div>` : '';
                    let fileButtonHTML = task.fileUrl ? `<button onclick="event.stopPropagation(); forceDownload('${task.fileUrl}', 'nuoroda')" class="mt-1 w-full ${linkStyle} border text-[9px] font-bold py-0.5 rounded transition shadow-sm">${linkLabel}</button>` : '';

                    card.className = "task-card bg-white p-2 rounded-lg shadow-sm border border-gray-200/80 w-full";
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-1"><div class="flex gap-1 items-center">${pDot}${catBadge}${transferBadge}</div><span class="text-[9px] font-bold text-gray-400 bg-gray-50 px-1 rounded border border-gray-100">${task.assignee || '—'}</span></div>
                        <h4 class="font-bold text-gray-900 text-xs mb-0.5 leading-snug">${task.title || '—'}</h4>
                        ${task.desc ? `<p class="text-gray-400 text-[10px] leading-tight mb-0.5 line-clamp-1">${task.desc}</p>` : ''}
                        ${commentBadgeHTML} ${checklistHTML} ${fileButtonHTML}
                        <div class="flex justify-between items-center text-[8px] text-gray-400 mt-1.5 pt-1 border-t border-gray-100/60"><div>⏱️ ${task.createdAt || ''}</div>${task.date ? `<div class="${dateBadgeStyle}">🏁 ${task.date}</div>` : ''}</div>
                    `;
                }
                const targetList = lists[currentStatus]; if (targetList) targetList.appendChild(card);
            });
            if (document.getElementById('count-todo')) document.getElementById('count-todo').innerText = globalCounts.todo;
            if (document.getElementById('count-progress')) document.getElementById('count-progress').innerText = globalCounts.progress;
            if (document.getElementById('count-done')) document.getElementById('count-done').innerText = globalCounts.done;
        }

        function setFilter(member) { currentFilter = member; updateFilterButtonUI(); renderTasks(); }
        function updateFilterButtonUI() {
            const buttons = ['all', 'Ramūnas', 'Ingrida', 'Aušrinė'];
            buttons.forEach(b => { const btn = document.getElementById(`filter-${b}`); if (btn) btn.className = b === currentFilter ? "px-2.5 py-1 rounded-md font-bold transition bg-gray-900 text-white shadow-sm" : "px-2.5 py-1 rounded-md font-bold transition text-gray-400 hover:bg-gray-50"; });
        }

        window.openCreateModal = openCreateModal; window.openEditModal = openEditModal; window.closeModal = closeModal;
        window.saveTask = saveTask; window.deleteTask = deleteTask; window.setFilter = setFilter;
        window.allowDrop = allowDrop; window.drop = drop; window.dropAssignee = dropAssignee;
        window.openHistoryModal = openHistoryModal; window.closeHistoryModal = closeHistoryModal;
        window.openFilesModal = openFilesModal; window.closeFilesModal = closeFilesModal;
        window.renderTasks = renderTasks; window.dragEnter = dragEnter; window.dragLeave = dragLeave;
        window.dragEnterAssignee = dragEnterAssignee; window.dragLeaveAssignee = dragLeaveAssignee;
        window.addChecklistItem = addChecklistItem; window.toggleChecklistState = toggleChecklistState; window.removeChecklistItem = removeChecklistItem;
        window.setLayout = setLayout; window.deleteSharedFile = deleteSharedFile; window.handleShelfFileSelect = handleShelfFileSelect;
        window.forceDownload = forceDownload; window.addCommentItem = addCommentItem; window.toggleAdvancedFields = toggleAdvancedFields;

        try { updateLayoutUI(); } catch (e) { console.error(e); }
        try {
            onSnapshot(query(collection(db, "shared_files"), orderBy("timestamp", "desc"), limit(100)), (snapshot) => {
                sharedFiles = []; totalStorageSize = 0;
                snapshot.forEach((doc) => { const data = doc.data(); sharedFiles.push({ id: doc.id, ...data }); if (data.size) totalStorageSize += data.size; });
                try { renderFileShelf(); updateStorageBarUI(); } catch(err) { console.error(err); }
            });
            onSnapshot(collection(db, "tasks"), (snapshot) => {
                tasks = []; snapshot.forEach((doc) => { tasks.push({ id: doc.id, ...doc.data() }); });
                try { renderTasks(); } catch(err) { console.error(err); }
            });
            onSnapshot(query(collection(db, "history"), orderBy("timestamp", "desc"), limit(150)), (snapshot) => {
                historyLog = []; snapshot.forEach((doc) => { historyLog.push(doc.data()); });
            });
        } catch (e) { console.error(e); }
    </script>
</body>
